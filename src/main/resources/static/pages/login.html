<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Estágios - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

<div class="container">
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow col-10 col-sm-8 col-md-6 col-lg-4">
            <div class="card-body p-4">
                
                <div class="d-flex justify-content-center align-items-center mt-2">
                    <img src="../assets/image/profile.png" style="max-height: 50px;">
                    <h3 class="ms-2 mt-2 fs-3">Login</h3>
                </div>
                
                <div class="d-flex justify-content-center align-items-center mt-3 text-center">
                    <h6 class="fs-7 text-secondary fw-normal">
                        Bem-vindo(a)!<br>Acesse com sua conta para continuar.
                    </h6>
                </div>

                <form id="formLogin" class="mt-4">
                    
                    <div class="form-outline">
                        <input type="email" id="email" class="form-control" placeholder=" " required>
                        <label for="email">E-mail</label>
                    </div>
                    
                    <div class="form-outline">
                        <input type="password" id="senha" class="form-control" placeholder=" " required>
                        <label for="senha">Senha</label>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn bg-save text-white fw-bold">Entrar</button>
                    </div>
                    
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/login.js"></script>

</body>
</html>
