<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="../assets/css/style.css">

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar p-3">

            <h4 class="mb-4">
                Menu
            </h4>

            <div class="d-grid gap-2">

                <!-- DASHBOARD -->
                <a href="dashboard.html" class="btn btn-primary">Dashboard</a>

                

                <!-- USUÁRIOS -->
                <a href="usuarios.html" class="btn btn-outline-secondary">Usuários</a>

                  

                <!-- ESTÁGIOS -->
                <a href="vagas.html" class="btn btn-outline-secondary">Estágios</a>

                   

                <!-- CANDIDATURAS -->
                <a href="candidaturas.html" class="btn btn-outline-secondary">Candidaturas</a>

                <!-- SAIR -->
                <a href="../login/login.html" class="btn btn-danger mt-3">Sair</a>

            </div>

        </div>

        <!-- CONTEÚDO -->
        <div class="col-md-10 p-4">

            <h2 class="mb-4">
                Dashboard
            </h2>

            <!-- CARDS -->
            <div class="row g-4">

                <!-- CARD USUÁRIOS -->
                <div class="col-md-4">

                    <div class="card shadow-sm border-0">

                        <div class="card-body">

                            <h5 class="card-title">
                                Usuários
                            </h5>

                            <h2 id="totalUsuarios">
                                0
                            </h2>

                            <p class="text-muted">
                                Usuários cadastrados
                            </p>

                            <a href="usuarios.html"
                               class="btn btn-primary btn-sm">

                                Gerenciar

                            </a>

                        </div>

                    </div>

                </div>

                <!-- CARD ESTAGIOS -->
                <div class="col-md-4">

                    <div class="card shadow-sm border-0">

                        <div class="card-body">

                            <h5 class="card-title">
                                Estágios
                            </h5>

                            <h2 id="totalEstagios">
                                0
                            </h2>

                            <p class="text-muted">
                                Estágios disponíveis
                            </p>

                            <a href="vagas.html"
                               class="btn btn-success btn-sm">

                                Gerenciar

                            </a>

                        </div>

                    </div>

                </div>

                <!-- CARD CANDIDATURAS -->
                <div class="col-md-4">

                    <div class="card shadow-sm border-0">

                        <div class="card-body">

                            <h5 class="card-title">
                                Candidaturas
                            </h5>

                            <h2 id="totalCandidaturas">
                                0
                            </h2>

                            <p class="text-muted">
                                Candidaturas realizadas
                            </p>

                            <a href="candidaturas.html"
                               class="btn btn-warning btn-sm">

                                Gerenciar

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="../assets/js/app.js"></script>
<script src="../assets/js/dashboard.js"></script>

</body>

</html>
