<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <!-- Incorporaçãop do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Chamado ao processo de estilização CSS -->
    <link rel="stylesheet"
          href="../assets/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar p-3">

            <h4 class="mb-4">
                Menu
            </h4>

            <div class="d-grid gap-2">

                <a href="#"
                   class="btn btn-outline-primary">
                    Dashboard
                </a>

                <a href="#"
                   class="btn btn-outline-secondary">
                    Usuários
                </a>

                <a href="#"
                   class="btn btn-outline-success">
                    Vagas
                </a>

                <a href="#"
                   class="btn btn-outline-warning">
                    Candidaturas
                </a>

            </div>

        </div>

        <!-- CONTEÚDO -->
        <div class="col-md-10 p-4">

            <h2 class="mb-4">
                Dashboard
            </h2>

            <!-- CARDS -->
            <div class="row g-4">

                <!-- CARD USUÁRIOS -->
                <div class="col-md-4">

                    <div class="card shadow-sm border-0">

                        <div class="card-body">

                            <h5 class="card-title">
                                Usuários
                            </h5>

                            <h2 id="totalUsuarios">
                                0
                            </h2>

                            <p class="text-muted">
                                Usuários cadastrados
                            </p>

                        </div>

                    </div>

                </div>

                <!-- CARD VAGAS -->
                <div class="col-md-4">

                    <div class="card shadow-sm border-0">

                        <div class="card-body">

                            <h5 class="card-title">
                                Vagas
                            </h5>

                            <h2 id="totalVagas">
                                0
                            </h2>

                            <p class="text-muted">
                                Vagas disponíveis
                            </p>

                        </div>

                    </div>

                </div>

                <!-- CARD CANDIDATURAS -->
                <div class="col-md-4">

                    <div class="card shadow-sm border-0">

                        <div class="card-body">

                            <h5 class="card-title">
                                Candidaturas
                            </h5>

                            <h2>
                                0
                            </h2>

                            <p class="text-muted">
                                Candidaturas realizadas
                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Rodape padronizado -->
<div id="footer"></div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Código script -->
<script src="../assets/js/app.js"></script>

</body>
</html>
