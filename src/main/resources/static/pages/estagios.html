<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Vagas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="../assets/css/style.css">

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar p-3">

            <h4 class="mb-4">
                Menu
            </h4>

            <div class="d-grid gap-2">

                <a href="dashboard.html"
                   class="btn btn-outline-primary">

                    Dashboard

                </a>

                <a href="usuarios.html"
                   class="btn btn-outline-secondary">

                    Usuários

                </a>

                <a href="candidaturas.html"
                   class="btn btn-success">

                    Candidaturas

                </a>

            </div>

        </div>

        <!-- CONTEÚDO -->
        <div class="col-md-10 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2>
                    Lista de Estágios
                </h2>

                <button class="btn btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#modalVaga">

                    Novo Estágio

                </button>

            </div>

            <!-- MODAL -->
            <div class="modal fade"
                 id="modalVaga"
                 tabindex="-1"
                 aria-hidden="true">

                <div class="modal-dialog">

                    <div class="modal-content">

                        <div class="modal-header">

                            <h5 class="modal-title">
                                Cadastro de Estágio
                            </h5>

                            <button type="button"
                                    class="btn-close"
                                    data-bs-dismiss="modal"
                                    aria-label="Close">
                            </button>

                        </div>

                        <div class="modal-body">

                            <form id="formVaga">
                                <input type="hidden" id="vagaId">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Título
                                    </label>

                                    <input type="text"
                                           id="titulo"
                                           class="form-control"
                                           required>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Empresa
                                    </label>

                                    <input type="text"
                                           id="empresa"
                                           class="form-control"
                                           required>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Descrição
                                    </label>

                                    <textarea id="descricao"
                                              class="form-control"
                                              rows="3"></textarea>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Carga Horária
                                    </label>

                                    <input type="number"
                                           id="cargaHoraria"
                                           class="form-control"
                                           required>

                                </div>

                                <button type="submit"
                                        class="btn btn-primary w-100">

                                    Salvar Estágio

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

            <!-- TABELA -->
            <div class="card shadow-sm border-0">

                <div class="card-body">

                    <table class="table table-hover align-middle">

                        <thead class="table-dark">

                        <tr>

                            <th>ID</th>
                            <th>Título</th>
                            <th>Empresa</th>
                            <th>Carga Horária</th>
                            <th>Status</th>
                            <th>Ações</th>

                        </tr>

                        </thead>

                        <tbody id="tabelaVagas">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="../assets/js/vagas.js"></script>

</body>
</html>
