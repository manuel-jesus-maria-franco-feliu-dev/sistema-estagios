<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Usuários
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="../assets/css/style.css">

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar p-3">

            <h4 class="mb-4">

                Menu

            </h4>

            <div class="d-grid gap-2">

                <a href="dashboard.html"
                   class="btn btn-outline-primary">

                    Dashboard

                </a>

                <a href="usuarios.html"
                   class="btn btn-success">

                    Usuários

                </a>

                <a href="estagios.html"
                   class="btn btn-outline-secondary">

                    Estágios

                </a>

            </div>

        </div>

        <!-- CONTEÚDO -->
        <div class="col-md-10 p-4">

            <div class="d-flex
                        justify-content-between
                        align-items-center
                        mb-4">

                <h2>

                    Lista de Usuários

                </h2>

                <button class="btn btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#modalUsuario">

                    Novo Usuário

                </button>

            </div>

            <!-- TABELA -->
            <div class="card shadow-sm border-0">

                <div class="card-body">

                    <table class="table table-hover">

                        <thead class="table-dark">

                        <tr>

                            <th>ID</th>

                            <th>Nome</th>

                            <th>Email</th>

                            <th>Perfil</th>

                            <th>Status</th>

                            <th>Ações</th>

                        </tr>

                        </thead>

                        <tbody id="tabelaUsuarios">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade"
     id="modalUsuario"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Cadastro de Usuário

                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <form id="formUsuario">

                    <!-- ID OCULTO -->
                    <input type="hidden"
                           id="usuarioId">

                    <!-- NOME -->
                    <div class="mb-3">

                        <label class="form-label">

                            Nome

                        </label>

                        <input type="text"
                               id="nome"
                               class="form-control text-uppercase"
                               required>

                    </div>

                    <!-- EMAIL -->
                    <div class="mb-3">

                        <label class="form-label">

                            E-mail

                        </label>

                        <input type="email"
                               id="email"
                               class="form-control"
                               required>

                    </div>

                    <!-- SENHA -->
                    <div class="mb-3">

                        <label class="form-label">

                            Senha

                        </label>

                        <input type="password"
                               id="senha"
                               class="form-control"
                               required>

                    </div>

                    <!-- PERFIL -->
                    <div class="mb-3">

                        <label class="form-label">

                            Perfil

                        </label>

                        <select id="perfil"
                                class="form-select">

                            <option value="ALUNO">

                                Aluno

                            </option>

                            <option value="PROFESSOR">

                                Professor

                            </option>

                            <option value="ADMIN">

                                Administrador

                            </option>

                        </select>

                    </div>

                    <!-- BOTÃO -->
                    <button type="submit"
                            class="btn btn-primary w-100">

                        Salvar Usuário

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="../assets/js/usuarios.js"></script>

</body>
</html>
