# ============================================
# BANCO DE DADOS
# ============================================

# Railway fornece DATABASE_URL automaticamente
# Se não existir (local), usa MySQL local
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/sistema_estagios}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Kdmf83cy2dxw9h#}

# Driver MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE
# ============================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================
# SERVIDOR
# ============================================

# Railway define PORT automaticamente
server.port=${PORT:8080}

# ============================================
# ERROS
# ============================================

spring.web.error.include-message=always

# ============================================
# RECURSOS ESTÁTICOS
# ============================================

spring.web.resources.static-locations=classpath:/static/